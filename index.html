<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graduation Runner</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw !important;
    height: 100vh !important;
    object-fit: contain;
    image-rendering: pixelated;
  }

  /* ── THÊM PHẦN NÀY ── */
  #rotate-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #0a0a1a;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    text-align: center;
    gap: 20px;
  }
  #rotate-overlay .icon {
    font-size: 56px;
    animation: rockit 1.5s ease-in-out infinite alternate;
  }
  #rotate-overlay p {
    font-size: 10px;
    line-height: 1.8;
    color: #f7e03c;
  }
  @keyframes rockit {
    from { transform: rotate(-20deg); }
    to   { transform: rotate(20deg); }
  }

  /* Hiện overlay khi portrait trên mobile */
  @media (max-width: 900px) and (orientation: portrait) {
    canvas { display: none !important; }
    #rotate-overlay { display: flex !important; }
  }
</style>
</head>
<body>

<!-- <div id="ui">
    <input id="nameInput" placeholder="Enter your name..." />
    <div id="hint">Tap / Press SPACE to Begin</div>
</div> -->
<!-- Overlay xoay máy -->
<div id="rotate-overlay">
  <div class="icon">📱</div>
  <p>PLEASE ROTATE<br>YOUR DEVICE<br>TO LANDSCAPE</p>
</div>

<script type="module" src="main.js"></script>
<script>
  // Thử lock orientation về landscape (chỉ hoạt động khi có user gesture)
  function tryLockLandscape() {
    const scr = window.screen;
    if (scr.orientation && scr.orientation.lock) {
      scr.orientation.lock("landscape").catch(() => {
        // Browser không cho phép lock → overlay CSS sẽ xử lý
      });
    }
  }

  // Gọi khi user chạm / click lần đầu
  document.addEventListener("pointerdown", tryLockLandscape, { once: true });
  document.addEventListener("keydown",     tryLockLandscape, { once: true });
</script>
</body>
</html>

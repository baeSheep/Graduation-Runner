<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graduation Runner</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>

</head>
<body>

<!-- <div id="ui">
    <input id="nameInput" placeholder="Enter your name..." />
    <div id="hint">Tap / Press SPACE to Begin</div>
</div> -->

<script type="module" src="main.js"></script>
<!-- Overlay xoay máy -->
<div id="rotate-overlay">
  <div class="icon">📱</div>
  <p>PLEASE ROTATE<br>YOUR DEVICE<br>TO LANDSCAPE</p>
</div>

<script>
  // Thử lock orientation về landscape (chỉ hoạt động khi có user gesture)
  function tryLockLandscape() {
    const scr = window.screen;
    if (scr.orientation && scr.orientation.lock) {
      scr.orientation.lock("landscape").catch(() => {
        // Browser không cho phép lock → overlay CSS sẽ xử lý
      });
    }
  }

  // Gọi khi user chạm / click lần đầu
  document.addEventListener("pointerdown", tryLockLandscape, { once: true });
  document.addEventListener("keydown",     tryLockLandscape, { once: true });
</script>
</body>
</html>
